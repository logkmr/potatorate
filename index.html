<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>potatoRate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#faf9f7;--surface2:#eeebe5;
  --border:#ddd9d2;--border2:#c8c3bb;
  --text:#1a1714;--muted:#8a857e;
  --ax:#d4450c;--ay:#1a6e3c;--az:#1a3d8a;--aavg:#7b2d8b;
  --ok:#1a6e3c;--err:#d4450c;
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* topbar */
#topbar{
display:flex;align-items:center;gap:8px;padding:9px 12px;
background:var(--surface);border-bottom:1px solid var(--border);
flex-shrink:0;z-index:20;
}
#topbar h1{font-family:‘Syne’,sans-serif;font-size:14px;font-weight:800;flex:1}
#topbar h1 span{color:var(--ax)}
.tb-btn{
background:none;border:1.5px solid var(--border2);border-radius:6px;
color:var(--text);font-size:11px;font-family:‘DM Mono’,monospace;
padding:5px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.tb-btn:hover{border-color:var(--ax);background:#d4450c0d}
.tb-btn.active, .tb-btn.on{border-color:var(--ax);background:#d4450c10;color:var(--ax)}

/* toggle switch */
.pkg-tgl{
display:flex;align-items:center;gap:6px;font-size:11px;font-family:'Syne',sans-serif;font-weight:800;color:var(--text);
}
.float-tgl{
position:absolute;bottom:16px;left:16px;background:var(--surface);padding:6px 12px 6px 8px;border-radius:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:20;
}
.switch{position:relative;display:inline-block;width:34px;height:20px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--border2);transition:.3s;border-radius:20px;}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background-color:white;transition:.3s;border-radius:50%;}
input:checked + .slider{background-color:var(--ax);}
input:checked + .slider:before{transform:translateX(14px);}

/* status pill */
#status{
font-size:10px;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;
border:1px solid var(--border);color:var(--muted);transition:all .3s;
}
#status.ok{color:var(--ok);border-color:#1a6e3c44;background:#1a6e3c0a}
#status.err{color:var(--err);border-color:#d4450c44;background:#d4450c0a}
#status.loading{color:var(--muted);border-color:var(--border)}

/* middle */
#middle{display:flex;flex:1;overflow:hidden;position:relative}
#canvas-wrap{flex:1;position:relative;min-width:0}
canvas{display:block;width:100%!important;height:100%!important}

/* right panel */
#rp{
width:264px;background:var(--surface);border-left:1px solid var(--border);
display:flex;flex-direction:column;overflow:hidden;
transition:width .25s ease;flex-shrink:0;
}
#rp.collapsed{width:0;border-left-width:0}
.rp-sec{border-bottom:1px solid var(--border);padding:14px}
.sec-title{
font-family:‘Syne’,sans-serif;font-size:10px;font-weight:800;
letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:11px;
}
.field{margin-bottom:9px}
.field label{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);margin-bottom:4px}
.field label b{font-family:‘Syne’,sans-serif;font-size:13px;font-weight:800}
.vx{color:var(--ax)}.vy{color:var(--ay)}.vz{color:var(--az)}
input[type=text],input[type=number]{
width:100%;background:var(--surface2);border:1.5px solid var(--border);
border-radius:6px;color:var(--text);font-family:‘DM Mono’,monospace;
font-size:13px;padding:7px 9px;outline:none;
transition:border-color .15s,box-shadow .15s;-moz-appearance:textfield;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--ax);box-shadow:0 0 0 3px #d4450c18}
.row2{display:flex;gap:7px}
.row2 .field{flex:1}
input[type=color]{
-webkit-appearance:none;width:100%;height:34px;
border:1.5px solid var(--border);border-radius:6px;
background:none;cursor:pointer;padding:3px;
}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:4px}
input[type=range]{width:100%;accent-color:var(--ax);margin-top:6px}
#size-val{font-size:11px;color:var(--ax);min-width:14px}
#btn-add{
width:100%;margin-top:6px;background:var(--text);border:none;border-radius:7px;
color:var(--bg);font-family:‘Syne’,sans-serif;font-weight:800;font-size:12px;
letter-spacing:.5px;padding:10px;cursor:pointer;transition:background .15s,transform .1s;
}
#btn-add:hover{background:#333}
#btn-add:active{transform:scale(.98)}
#btn-add:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* points list */
#pts-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
#pts-list{
flex:1;overflow-y:auto;padding:6px 10px 10px;
display:flex;flex-direction:column;gap:5px;
}
#pts-list::-webkit-scrollbar{width:3px}
#pts-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.empty{text-align:center;font-size:11px;color:var(--muted);padding:16px 0}
.pt-item{
background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;
padding:8px 10px;display:flex;align-items:flex-start;gap:8px;animation:si .18s ease;
}
@keyframes si{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.pt-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.pt-info{flex:1;min-width:0}
.pt-name{font-family:‘Syne’,sans-serif;font-weight:800;font-size:12px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-coords{font-size:10px;color:var(--muted)}
.pt-coords s{margin-right:5px;font-style:normal;text-decoration:none}
.pt-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0;transition:color .15s}
.pt-del:hover{color:var(--ax)}
.pt-del:disabled{opacity:.4;cursor:not-allowed}
.pt-edit{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0;transition:color .15s;margin-right:6px}
.pt-edit:hover{color:var(--ay)}
.pt-edit:disabled{opacity:.4;cursor:not-allowed}

/* stats */
#stats{
background:var(--surface);border-top:1px solid var(--border);
flex-shrink:0;overflow:hidden;max-height:0;transition:max-height .3s ease;
}
#stats.open{max-height:230px}
.stats-inner{padding:10px 14px 12px}
.stats-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stats-hdr .sec-title{margin:0;flex:1}
.tab-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab-btn{
font-family:‘Syne’,sans-serif;font-size:10px;font-weight:800;
padding:4px 10px;border-radius:20px;border:1.5px solid var(--border2);
background:none;cursor:pointer;transition:all .15s;color:var(--muted);white-space:nowrap;
}
.tab-btn.active{color:#fff;border-color:transparent}
.rank-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:140px}
.rank-list::-webkit-scrollbar{width:3px}
.rank-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ri{
display:flex;align-items:center;gap:8px;animation:fi .18s ease;
padding:5px 8px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);
}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.rn{font-family:‘Syne’,sans-serif;font-size:12px;font-weight:800;width:18px;text-align:center;flex-shrink:0}
.gold{color:#c9920a}.silver{color:#888}.bronze{color:#a0603a}.dim{color:var(--muted)}
.rd{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.rname{font-size:12px;font-family:‘Syne’,sans-serif;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rval-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.rval{font-size:12px;font-weight:500;padding:2px 7px;border-radius:5px;color:#fff}
.rbar-wrap{width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.rbar{height:100%;border-radius:2px;transition:width .4s ease}

/* hint */
#hint{
position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
font-size:10px;color:var(--muted);white-space:nowrap;
background:var(--surface);border:1px solid var(--border);
border-radius:20px;padding:4px 12px;pointer-events:none;opacity:.75;
}

/* FAB */
#fab{
display:none;position:fixed;bottom:20px;right:16px;z-index:30;
width:52px;height:52px;border-radius:50%;
background:var(--text);border:none;color:var(--bg);
font-size:24px;cursor:pointer;box-shadow:var(--shadow);
align-items:center;justify-content:center;transition:transform .15s;
}
#fab:active{transform:scale(.92)}

#mob-nav{
display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;
background:var(--surface);border-top:1px solid var(--border);
padding-bottom:env(safe-area-inset-bottom,0);
align-items:center;justify-content:space-around;
box-shadow:0 -2px 10px rgba(0,0,0,.05);
}
.mn-btn{
flex:1;padding:12px 0;background:none;border:none;
font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.mn-btn.active{color:var(--ax)}
.mn-add{
width:48px;height:48px;padding:0;flex:none;background:var(--text);color:transparent !important;font-size:0;
border-radius:50%;margin:-20px 10px 0;
box-shadow:var(--shadow);border:4px solid var(--bg);
position:relative;
}
.mn-add::before, .mn-add::after{
content:'';position:absolute;background:var(--bg);
top:50%;left:50%;transform:translate(-50%,-50%);border-radius:1px;transition:background .15s;
}
.mn-add.active::before, .mn-add.active::after{background:var(--ax)}
.mn-add::before{width:16px;height:2.5px;}
.mn-add::after{width:2.5px;height:16px;}
.mn-add:active{transform:scale(.92)}

/* mobile sheet */
#mob{display:flex;position:fixed;inset:0;z-index:30;background:transparent;align-items:flex-end;pointer-events:none;visibility:hidden;transition:visibility .3s}
#mob.open{pointer-events:auto;visibility:visible}
.sheet{width:100%;background:var(--surface);border-radius:18px 18px 0 0;max-height:80vh;overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .3s cubic-bezier(.1,.8,.3,1);box-shadow:0 -4px 20px rgba(0,0,0,.15);pointer-events:auto;display:flex;flex-direction:column}
#mob.open .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
.sheet-tabs{display:none}
.stab{
flex:1;padding:11px 6px;font-family:‘Syne’,sans-serif;font-size:11px;font-weight:800;
text-align:center;background:none;border:none;color:var(--muted);cursor:pointer;
border-bottom:2px solid transparent;transition:all .15s;
}
.stab.active{color:var(--ax);border-bottom-color:var(--ax)}
.sheet-page{display:none;padding:16px}
.sheet-page.active{display:block}
.m-add-btn{
width:100%;margin-top:10px;background:var(--text);border:none;border-radius:8px;
color:var(--bg);font-family:‘Syne’,sans-serif;font-weight:800;font-size:13px;padding:13px;cursor:pointer;
}
.m-add-btn:disabled{opacity:.5;cursor:not-allowed}

/* mobile stats */
.mob-stats-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.mob-tab-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.mob-rank-list{display:flex;flex-direction:column;gap:6px}
.mob-ri{
display:flex;align-items:center;gap:10px;
padding:10px 12px;border-radius:10px;
background:var(--surface2);border:1.5px solid var(--border);animation:fi .18s ease;
}
.mob-ri .rn{font-size:14px;width:20px}
.mob-ri .rd{width:13px;height:13px}
.mob-ri .rname{font-size:13px}
.mob-ri .rval-wrap{gap:3px}
.mob-ri .rval{font-size:13px;padding:3px 9px}
.mob-ri .rbar-wrap{width:60px;height:4px}

/* spinner */
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--ax);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* photo popup */
#photo-popup{
  position:absolute;display:none;z-index:45;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.15);
  transform:translate(-50%, -100%); margin-top:-15px;
  max-width:200px;
}
#photo-popup::after{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--border);
}
#photo-popup img{width:100%;height:auto;border-radius:6px;display:block;}

@media(max-width:640px){
#rp{display:none}
#mob-nav{display:flex}
.float-tgl{bottom:calc(70px + env(safe-area-inset-bottom,0px));left:12px}
#hint{display:none}
#stats{display:none}
#status{display:none}
#t-panel, #t-stats {display:none}
#topbar h1{text-align:center}
}
</style>

</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>potato<span>Rate</span></h1>
    <div id="status" class="loading">⏳ загрузка…</div>
    <button class="tb-btn on" id="t-panel">☰ Список</button>
    <button class="tb-btn" id="t-stats">▲ Топ</button>
  </div>

  <div id="middle">
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="hint">ЛКМ — вращение · Колесо — масштаб · ПКМ — панорама</div>
      <label class="pkg-tgl float-tgl">
        <div class="switch"><input type="checkbox" id="tgl-pkg"><span class="slider"></span></div>
        С пакетом
      </label>
      <div id="photo-popup"><img id="photo-popup-img" src=""></div>
    </div>

<div id="rp">
  <div class="rp-sec">
    <div class="sec-title">Новая точка</div>
    <div class="field"><label>Название</label><input type="text" id="in-name" placeholder="Точка 1" maxlength="24"></div>
    <div class="row2">
      <div class="field"><label><b class="vx">V</b> X</label><input type="number" id="in-v" value="0" step="any"></div>
      <div class="field"><label><b class="vy">Vision</b> Y</label><input type="number" id="in-fa" value="0" step="any"></div>
    </div>
    <div class="field"><label><b class="vz">G</b> Z</label><input type="number" id="in-g" value="0" step="any"></div>

    <div class="sec-title" style="margin:12px 0 6px">С пакетом</div>
    <div class="row2">
      <div class="field"><label><b class="vx">V</b> X</label><input type="number" id="in-vp" value="0" step="any"></div>
      <div class="field"><label><b class="vy">Vision</b> Y</label><input type="number" id="in-fap" value="0" step="any"></div>
    </div>
    <div class="field"><label><b class="vz">G</b> Z</label><input type="number" id="in-gp" value="0" step="any"></div>
    <div style="height:8px"></div>

    <div class="row2">
      <div class="field"><label>Цвет</label><input type="color" id="in-col" value="#d4450c"></div>
      <div class="field"><label>Размер &nbsp;<span id="size-val">4</span></label><input type="range" id="in-sz" min="1" max="10" value="4"></div>
    </div>
    <div class="field">
      <label>Фото (клик по фото = удалить)</label>
      <input type="file" id="in-photo" accept="image/*" style="font-size:10px; margin-bottom:4px">
      <img id="in-photo-preview" style="display:none; width:100%; max-height:100px; object-fit:contain; border-radius:6px; cursor:pointer; border:1px solid var(--border)">
    </div>
    <button id="btn-add">+ Добавить</button>
  </div>
  <div id="pts-wrap">
    <div style="padding:10px 14px 4px;flex-shrink:0">
      <div class="sec-title" style="margin:0">Точки <span id="cnt" style="color:var(--ax);font-family:Syne,sans-serif">0</span></div>
    </div>
    <div id="pts-list"><div class="empty">Загрузка…</div></div>
  </div>
</div>

  </div>

  <div id="stats">
    <div class="stats-inner">
      <div class="stats-hdr">
        <div class="sec-title">🏆 Топ по параметрам</div>
        <div id="s-cnt" style="font-size:10px;color:var(--muted)"></div>
      </div>
      <div class="tab-row" id="d-tabs"></div>
      <div class="rank-list" id="d-rank"></div>
    </div>
  </div>
</div>

<div id="mob-nav">
  <button class="mn-btn" data-tab="list">☰ Список</button>
  <button class="mn-btn mn-add" data-tab="add">+</button>
  <button class="mn-btn" data-tab="top">🏆 Рейтинг</button>
</div>

<div id="mob">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-tabs">
      <button class="stab active" data-tab="add">+ Добавить</button>
      <button class="stab" data-tab="list">Точки (<span id="m-cnt">0</span>)</button>
      <button class="stab" data-tab="top">🏆 Топ</button>
    </div>
    <div class="sheet-page active" id="sp-add">
      <div class="sec-title" id="m-add-title">Новая точка</div>
      <div class="field"><label>Название</label><input type="text" id="m-name" placeholder="Точка 1" maxlength="24"></div>
      <div class="row2">
        <div class="field"><label><b class="vx">V</b> X</label><input type="number" id="m-v" value="0" step="any"></div>
        <div class="field"><label><b class="vy">Vision</b> Y</label><input type="number" id="m-fa" value="0" step="any"></div>
      </div>
      <div class="field"><label><b class="vz">G</b> Z</label><input type="number" id="m-g" value="0" step="any"></div>

      <div class="sec-title" style="margin:12px 0 6px">С пакетом</div>
      <div class="row2">
        <div class="field"><label><b class="vx">V</b> X</label><input type="number" id="m-vp" value="0" step="any"></div>
        <div class="field"><label><b class="vy">Vision</b> Y</label><input type="number" id="m-fap" value="0" step="any"></div>
      </div>
      <div class="row2">
        <div class="field"><label><b class="vz">G</b> Z</label><input type="number" id="m-gp" value="0" step="any"></div>
        <div class="field"><label>Цвет</label><input type="color" id="m-col" value="#1a3d8a"></div>
      </div>
      <div class="field">
        <label>Фото (клик по фото = удалить)</label>
        <input type="file" id="m-photo" accept="image/*" style="font-size:11px; margin-bottom:4px">
        <img id="m-photo-preview" style="display:none; width:100%; max-height:120px; object-fit:contain; border-radius:8px; cursor:pointer; border:1px solid var(--border)">
      </div>
      <button class="m-add-btn" id="m-add">+ Добавить точку</button>
    </div>
    <div class="sheet-page" id="sp-list">
      <div id="m-pts" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>
    <div class="sheet-page" id="sp-top">
      <div class="mob-stats-hdr">
        <div class="sec-title" style="margin:0;flex:1">🏆 Топ по параметрам</div>
        <div id="m-s-cnt" style="font-size:10px;color:var(--muted)"></div>
      </div>
      <div class="mob-tab-row" id="m-tabs"></div>
      <div class="mob-rank-list" id="m-rank"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════
   THREE.JS SCENE
═══════════════════════════ */
const canvas=document.getElementById('c');
const wrap=document.getElementById('canvas-wrap');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0xf0ede8,1);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(55,1,.01,10000);
let sph={th:.7,ph:.9},camR=22,tgt=new THREE.Vector3();

function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);

scene.add(new THREE.GridHelper(20,20,0xc8c3bb,0xddd9d2));

function updCam(){
  camera.position.set(tgt.x+camR*Math.sin(sph.ph)*Math.sin(sph.th),tgt.y+camR*Math.cos(sph.ph),tgt.z+camR*Math.sin(sph.ph)*Math.cos(sph.th));
  camera.lookAt(tgt);
}
updCam();

let drag=false,rclick=false,prev={x:0,y:0},wasDragged=false;
canvas.addEventListener('mousedown',e=>{drag=true;wasDragged=false;rclick=e.button===2;prev={x:e.clientX,y:e.clientY}});
window.addEventListener('mouseup',e=>{
  drag=false;
  if(!wasDragged && e.target===canvas){
    const rect = canvas.getBoundingClientRect();
    const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
    const rc = new THREE.Raycaster();
    rc.setFromCamera(mouse, camera);
    const intersects = rc.intersectObjects(points.map(x=>x._m));
    if(intersects.length>0){
      const mesh = intersects[0].object;
      const p = points.find(x=>x._m===mesh);
      if(p && p.photo){
        const pp = document.getElementById('photo-popup');
        document.getElementById('photo-popup-img').src = p.photo;
        pp.style.left = e.clientX + 'px';
        pp.style.top = e.clientY + 'px';
        pp.style.display = 'block';
      } else {
        document.getElementById('photo-popup').style.display = 'none';
      }
    } else {
      document.getElementById('photo-popup').style.display = 'none';
    }
  }
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  wasDragged=true;
  const dx=e.clientX-prev.x,dy=e.clientY-prev.y;prev={x:e.clientX,y:e.clientY};
  if(!rclick){sph.th-=dx*.005;sph.ph=Math.max(.05,Math.min(Math.PI-.05,sph.ph-dy*.005));}
  else{const r=new THREE.Vector3();r.crossVectors(camera.getWorldDirection(new THREE.Vector3()),camera.up).normalize();tgt.addScaledVector(r,-dx*.015);tgt.addScaledVector(camera.up,dy*.015);}
  updCam();
});
canvas.addEventListener('wheel',e=>{camR=Math.max(1,camR+e.deltaY*.03);updCam();},{passive:true});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
let ld=null;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;wasDragged=false;rclick=false;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  else if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
canvas.addEventListener('touchend',e=>{
  drag=false;ld=null;
  if(!wasDragged && e.changedTouches.length===1 && e.target===canvas){
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mouse = new THREE.Vector2(((t.clientX - rect.left) / rect.width) * 2 - 1, -((t.clientY - rect.top) / rect.height) * 2 + 1);
    const rc = new THREE.Raycaster();
    rc.setFromCamera(mouse, camera);
    const intersects = rc.intersectObjects(points.map(x=>x._m));
    if(intersects.length>0){
      const mesh = intersects[0].object;
      const p = points.find(x=>x._m===mesh);
      if(p && p.photo){
        const pp = document.getElementById('photo-popup');
        document.getElementById('photo-popup-img').src = p.photo;
        pp.style.left = t.clientX + 'px';
        pp.style.top = t.clientY + 'px';
        pp.style.display = 'block';
      } else {
        document.getElementById('photo-popup').style.display = 'none';
      }
    } else {
      document.getElementById('photo-popup').style.display = 'none';
    }
  }
});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){
    wasDragged=true;
    const dx=e.touches[0].clientX-prev.x,dy=e.touches[0].clientY-prev.y;
    prev={x:e.touches[0].clientX,y:e.touches[0].clientY};
    sph.th-=dx*.005;sph.ph=Math.max(.05,Math.min(Math.PI-.05,sph.ph-dy*.005));updCam();
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(ld){camR=Math.max(1,camR-(d-ld)*.07);updCam();}ld=d;
  }
},{passive:true});
(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera)})();

const API='/api/points';

async function apiGet(){
  const r=await fetch(API);
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiAdd(p){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiUpdate(id, p){
  const r=await fetch(`${API}?id=${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiDel(id){
  const r=await fetch(`${API}?id=${id}`,{method:'DELETE'});
  if(!r.ok)throw new Error(await r.text());
}

function setStatus(msg,type='loading'){
  const el=document.getElementById('status');
  el.textContent=msg;el.className=type;
}

/* ═══════════════════════════
   SCENE OBJECTS
═══════════════════════════ */
const PALETTE=['#d4450c','#1a6e3c','#1a3d8a','#c9920a','#7b2d8b','#0e7490','#9b1c4e','#3d6b00'];
let points=[],autoCI=0,usePkg=false;

document.getElementById('tgl-pkg').addEventListener('change', e => {
  usePkg = e.target.checked;
  updateScenePositions();
  renderAll();
});

function hexInt(h){return parseInt(h.replace('#','0x'))}

function buildSceneObjects(p){
  const s=(p.size||4)*.075,c=hexInt(p.color);
  const v = usePkg ? (p.v_pkg||0) : p.v;
  const fa = usePkg ? (p.fa_pkg||0) : p.fa;
  const g = usePkg ? (p.g_pkg||0) : p.g;
  
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(s,20,20),new THREE.MeshBasicMaterial({color:c}));
  mesh.position.set(v,fa,g);scene.add(mesh);
  const lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(v,fa,g),new THREE.Vector3(v,0,g)]);
  const line=new THREE.Line(lg,new THREE.LineBasicMaterial({color:c,transparent:true,opacity:.3}));
  scene.add(line);
  const lc=document.createElement('canvas');lc.width=340;lc.height=80;
  const ctx=lc.getContext('2d');
  ctx.font='bold 26px DM Mono,monospace';ctx.fillStyle=p.color;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.name||(v+','+fa+','+g),170,40);
  const lsp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc),transparent:true,depthTest:false}));
  lsp.scale.set(3,.72,1);lsp.position.set(v,fa+s+.6,g);scene.add(lsp);
  return {mesh,line,lsp,s};
}
function removeSceneObjects(p){
  scene.remove(p._m);scene.remove(p._l);scene.remove(p._s);
  p._m.geometry.dispose();p._l.geometry.dispose();
}
function updateScenePositions(){
  points.forEach(p => {
    const v = usePkg ? (p.v_pkg||0) : p.v;
    const fa = usePkg ? (p.fa_pkg||0) : p.fa;
    const g = usePkg ? (p.g_pkg||0) : p.g;
    
    // update sphere
    p._m.position.set(v, fa, g);
    
    // update line
    const positions = p._l.geometry.attributes.position.array;
    positions[0] = v; positions[1] = fa; positions[2] = g;
    positions[3] = v; positions[4] = 0;  positions[5] = g;
    p._l.geometry.attributes.position.needsUpdate = true;
    
    // update text
    p._s.position.set(v, fa + p._s_size + .6, g);
    
    // recreate text canvas if coords in name
    if (!p.name) {
      const lc=document.createElement('canvas');lc.width=340;lc.height=80;
      const ctx=lc.getContext('2d');
      ctx.font='bold 26px DM Mono,monospace';ctx.fillStyle=p.color;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(v+','+fa+','+g,170,40);
      p._s.material.map.dispose();
      p._s.material.map = new THREE.CanvasTexture(lc);
    }
  });
}

/* ═══════════════════════════
   CRUD with API
═══════════════════════════ */
function setBusy(busy){
  document.getElementById('btn-add').disabled=busy;
  document.getElementById('m-add').disabled=busy;
  document.querySelectorAll('.pt-del').forEach(b=>b.disabled=busy);
  document.querySelectorAll('.pt-edit').forEach(b=>b.disabled=busy);
}

async function loadPoints(){
  setStatus('⏳ загрузка…','loading');
  try{
    const data=await apiGet();
    // clear scene
    points.forEach(p=>removeSceneObjects(p));
    points=[];
    data.forEach(p=>{
      const o=buildSceneObjects(p);p._m=o.mesh;p._l=o.line;p._s=o.lsp;p._s_size=o.s;
      points.push(p);
    });
    autoCI=points.length;
    setStatus('✓ '+points.length+' точек','ok');
    renderAll();
  }catch(e){
    setStatus('⚠ ошибка БД','err');
    console.error(e);
  }
}

let editId = null;

async function addPoint(v,fa,g,v_pkg,fa_pkg,g_pkg,name,color,size,photo){
  setBusy(true);
  setStatus('⏳ сохраняю…','loading');
  try{
    if(editId) {
      const p=await apiUpdate(editId, {v,fa,g,v_pkg,fa_pkg,g_pkg,name:name||('P'+points.length),color:color||PALETTE[autoCI%PALETTE.length],size:size||4,photo});
      const idx=points.findIndex(x=>x.id===editId);
      if(idx!==-1){
        removeSceneObjects(points[idx]);
        const o=buildSceneObjects(p);p._m=o.mesh;p._l=o.line;p._s=o.lsp;p._s_size=o.s;
        points[idx]=p;
      }
      setStatus('✓ обновлено','ok');
      editId = null;
      document.getElementById('btn-add').textContent = '+ Добавить';
      document.getElementById('m-add').textContent = '+ Добавить точку';
      document.querySelectorAll('.sec-title')[0].textContent = 'Новая точка';
      document.getElementById('m-add-title').textContent = 'Новая точка';
    } else {
      const p=await apiAdd({
        v,fa,g,v_pkg,fa_pkg,g_pkg,photo,
        name:name||('P'+(points.length+1)),
        color:color||PALETTE[autoCI++%PALETTE.length],
        size:size||4
      });
      const o=buildSceneObjects(p);p._m=o.mesh;p._l=o.line;p._s=o.lsp;p._s_size=o.s;
      points.push(p);
      setStatus('✓ сохранено','ok');
    }
    
    // reset photo states
    dPhotoBase64=''; mPhotoBase64='';
    document.getElementById('in-photo-preview').style.display='none';
    document.getElementById('m-photo-preview').style.display='none';
    document.getElementById('in-photo').value='';
    document.getElementById('m-photo').value='';

    renderAll();
  }catch(e){
    setStatus('⚠ ошибка сохранения','err');
    console.error(e);
  }finally{setBusy(false);}
}

async function delPoint(id){
  setBusy(true);
  setStatus('⏳ удаляю…','loading');
  try{
    await apiDel(id);
    const idx=points.findIndex(p=>p.id===id);
    if(idx!==-1){removeSceneObjects(points[idx]);points.splice(idx,1);}
    if(editId===id){
      editId = null;
      document.getElementById('btn-add').textContent = '+ Добавить';
      document.getElementById('m-add').textContent = '+ Добавить точку';
      document.querySelectorAll('.sec-title')[0].textContent = 'Новая точка';
      document.getElementById('m-add-title').textContent = 'Новая точка';
    }
    setStatus('✓ удалено','ok');
    renderAll();
  }catch(e){
    setStatus('⚠ ошибка удаления','err');
    console.error(e);
  }finally{setBusy(false);}
}

const TABS=[
  {key:'avg',label:'Среднее',   col:'#7b2d8b'},
  {key:'v',  label:'V (X)',     col:'#d4450c'},
  {key:'fa', label:'Vision (Y)',col:'#1a6e3c'},

];
let dActiveTab='avg',mActiveTab='avg';

function ptHTML(p){
  const v = usePkg ? (p.v_pkg||0) : p.v;
  const fa = usePkg ? (p.fa_pkg||0) : p.fa;
  const g = usePkg ? (p.g_pkg||0) : p.g;
  return `<div class="pt-item">
    <div class="pt-dot" style="background:${p.color}"></div>
    <div class="pt-info">
      <div class="pt-name">${p.name}</div>
      <div class="pt-coords">
        <s style="color:var(--ax)">V=${v}</s>
        <s style="color:var(--ay)">Vision=${fa}</s>
        <s style="color:var(--az)">G=${g}</s>
      </div>
    </div>
    <button class="pt-edit" data-id="${p.id}">✎</button>
    <button class="pt-del" data-id="${p.id}">×</button>
  </div>`;
}

function startEdit(id){
  const p = points.find(x=>x.id===id);
  if(!p) return;
  editId = id;
  
  // Update desktop form
  document.getElementById('in-name').value = p.name;
  document.getElementById('in-v').value = p.v;
  document.getElementById('in-fa').value = p.fa;
  document.getElementById('in-g').value = p.g;
  document.getElementById('in-vp').value = p.v_pkg || 0;
  document.getElementById('in-fap').value = p.fa_pkg || 0;
  document.getElementById('in-gp').value = p.g_pkg || 0;
  document.getElementById('in-col').value = p.color;
  document.getElementById('in-sz').value = p.size || 4;
  document.getElementById('size-val').textContent = p.size || 4;
  document.getElementById('btn-add').textContent = '✓ Сохранить';
  document.querySelectorAll('.sec-title')[0].textContent = 'Редактировать точку';
  
  if(p.photo) {
    dPhotoBase64 = p.photo;
    document.getElementById('in-photo-preview').src = p.photo;
    document.getElementById('in-photo-preview').style.display = 'block';
  } else {
    dPhotoBase64 = '';
    document.getElementById('in-photo-preview').style.display = 'none';
    document.getElementById('in-photo').value = '';
  }
  
  // Update mobile form
  document.getElementById('m-name').value = p.name;
  document.getElementById('m-v').value = p.v;
  document.getElementById('m-fa').value = p.fa;
  document.getElementById('m-g').value = p.g;
  document.getElementById('m-vp').value = p.v_pkg || 0;
  document.getElementById('m-fap').value = p.fa_pkg || 0;
  document.getElementById('m-gp').value = p.g_pkg || 0;
  document.getElementById('m-col').value = p.color;
  document.getElementById('m-add').textContent = '✓ Сохранить точку';
  document.getElementById('m-add-title').textContent = 'Редактировать точку';

  if(p.photo) {
    mPhotoBase64 = p.photo;
    document.getElementById('m-photo-preview').src = p.photo;
    document.getElementById('m-photo-preview').style.display = 'block';
  } else {
    mPhotoBase64 = '';
    document.getElementById('m-photo-preview').style.display = 'none';
    document.getElementById('m-photo').value = '';
  }
  
  if(window.innerWidth <= 640) {
    switchSheetTab('add');
    document.getElementById('mob').classList.add('open');
  }
}

function bindActions(root){
  root.querySelectorAll('.pt-del').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('Удалить эту точку?')) delPoint(b.dataset.id);
  }));
  root.querySelectorAll('.pt-edit').forEach(b=>b.addEventListener('click',()=>startEdit(b.dataset.id)));
}

function renderLists(){
  const el1=document.getElementById('pts-list');
  const el2=document.getElementById('m-pts');
  const html=points.length?points.map(ptHTML).join(''):'<div class="empty">Нет точек</div>';
  if(el1){el1.innerHTML=html;bindActions(el1);}
  if(el2){el2.innerHTML=html;bindActions(el2);}
  document.getElementById('cnt').textContent=points.length;
  document.getElementById('m-cnt').textContent=points.length;
}

function rankHTML(activeKey,isMobile){
  if(!points.length)return'<div class="empty">Добавьте точки</div>';
  const data=points.map(p=>{
    const v = usePkg ? (p.v_pkg||0) : p.v;
    const fa = usePkg ? (p.fa_pkg||0) : p.fa;
    const g = usePkg ? (p.g_pkg||0) : p.g;
    return {...p, v, fa, g, avg:+((v+fa+g)/3).toFixed(2)};
  });
  const sorted=[...data].sort((a,b)=>b[activeKey]-a[activeKey]);
  const maxVal=Math.max(...data.map(p=>Math.abs(p[activeKey])))||1;
  const tab=TABS.find(t=>t.key===activeKey);
  const medals=['gold','silver','bronze','dim','dim'];
  const itemClass=isMobile?'mob-ri':'ri';
  return sorted.map((p,r)=>{
    const val=activeKey==='avg'?p.avg:p[activeKey];
    const pct=Math.max(4,Math.round(Math.abs(val)/maxVal*100));
    const extra=isMobile?`<div style="font-size:10px;color:var(--muted);margin-top:2px">V=${p.v} · Vision=${p.fa} · G=${p.g}</div>`:'';
    const medalClass = r < 5 ? medals[r] : 'dim';
    return `<div class="${itemClass}">
      <span class="rn ${medalClass}">${r+1}</span>
      <span class="rd" style="background:${p.color}"></span>
      <div style="flex:1;min-width:0"><div class="rname">${p.name}</div>${extra}</div>
      <div class="rval-wrap">
        <span class="rval" style="background:${tab.col}">${val}</span>
        <div class="rbar-wrap"><div class="rbar" style="width:${pct}%;background:${tab.col}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function renderTabBtns(cid,activeKey,onClick){
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML=TABS.map(t=>`<button class="tab-btn${t.key===activeKey?' active':''}"
    style="${t.key===activeKey?'background:'+t.col+';border-color:'+t.col+';color:#fff':''}"
    data-key="${t.key}">${t.label}</button>`).join('');
  el.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>onClick(b.dataset.key)));
}

function renderDesktopStats(){
  const sc=document.getElementById('s-cnt');if(sc)sc.textContent=points.length?points.length+' точек':'';
  renderTabBtns('d-tabs',dActiveTab,k=>{dActiveTab=k;renderDesktopStats();});
  const el=document.getElementById('d-rank');if(el)el.innerHTML=rankHTML(dActiveTab,false);
}
function renderMobileStats(){
  const sc=document.getElementById('m-s-cnt');if(sc)sc.textContent=points.length?points.length+' точек':'';
  renderTabBtns('m-tabs',mActiveTab,k=>{mActiveTab=k;renderMobileStats();});
  const el=document.getElementById('m-rank');if(el)el.innerHTML=rankHTML(mActiveTab,true);
}
function renderAll(){renderLists();renderDesktopStats();renderMobileStats();}

let dPhotoBase64='', mPhotoBase64='';

function setupPhotoInput(inputId, imgId, getCb, setCb){
  const inp=document.getElementById(inputId), img=document.getElementById(imgId);
  inp.addEventListener('change', e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=> {
      const tempImg = new Image();
      tempImg.onload = () => {
        const MAX_SIZE = 600;
        let w = tempImg.width, h = tempImg.height;
        if(w > MAX_SIZE || h > MAX_SIZE){
          if(w > h) { h *= MAX_SIZE / w; w = MAX_SIZE; }
          else { w *= MAX_SIZE / h; h = MAX_SIZE; }
        }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(tempImg, 0, 0, w, h);
        const resizedBase64 = cv.toDataURL('image/jpeg', 0.85);
        setCb(resizedBase64);
        img.src = resizedBase64;
        img.style.display = 'block';
      };
      tempImg.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
  img.addEventListener('click', ()=>{
    setCb(''); img.src=''; img.style.display='none'; inp.value='';
  });
}
setupPhotoInput('in-photo', 'in-photo-preview', ()=>dPhotoBase64, v=>dPhotoBase64=v);
setupPhotoInput('m-photo', 'm-photo-preview', ()=>mPhotoBase64, v=>mPhotoBase64=v);

    parseFloat(document.getElementById('m-v').value)||0,
    parseFloat(document.getElementById('m-fa').value)||0,
    parseFloat(document.getElementById('m-g').value)||0,
    parseFloat(document.getElementById('m-vp').value)||0,
    parseFloat(document.getElementById('m-fap').value)||0,
    parseFloat(document.getElementById('m-gp').value)||0,
    document.getElementById('m-name').value.trim(),
    document.getElementById('m-col').value,4,
    mPhotoBase64
  );
  document.getElementById('m-name').value='';
  switchSheetTab('list');
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&['in-v','in-fa','in-g','in-name'].includes(document.activeElement?.id))
    document.getElementById('btn-add').click();
});

let panelOn=true,statsOn=false;
document.getElementById('t-panel').addEventListener('click',()=>{
  panelOn=!panelOn;
  document.getElementById('rp').classList.toggle('collapsed',!panelOn);
  document.getElementById('t-panel').classList.toggle('on',panelOn);
  setTimeout(resize,280);
});
document.getElementById('t-stats').addEventListener('click',()=>{
  statsOn=!statsOn;
  document.getElementById('stats').classList.toggle('open',statsOn);
  document.getElementById('t-stats').textContent=statsOn?'▼ Топ':'▲ Топ';
  document.getElementById('t-stats').classList.toggle('on',statsOn);
  if(statsOn)renderDesktopStats();
  setTimeout(resize,320);
});

function switchSheetTab(tab){
  document.querySelectorAll('.mn-btn:not(.mn-add)').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.sheet-page').forEach(p=>p.classList.toggle('active',p.id==='sp-'+tab));
  if(tab==='top')renderMobileStats();
}
document.querySelectorAll('.mn-btn').forEach(b=>b.addEventListener('click',()=> {
  const mob = document.getElementById('mob');
  const isCurrentlyActive = b.classList.contains('active') || (b.classList.contains('mn-add') && document.getElementById('sp-add').classList.contains('active'));
  
  if(mob.classList.contains('open') && isCurrentlyActive) {
    mob.classList.remove('open');
  } else {
    switchSheetTab(b.dataset.tab);
    mob.classList.add('open');
  }
}));
document.getElementById('mob').addEventListener('click',e=>{if(e.target===document.getElementById('mob'))document.getElementById('mob').classList.remove('open');});

/* ═══════════════════════════
   INIT
═══════════════════════════ */
loadPoints();
</script>
